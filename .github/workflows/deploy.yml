name: Deploy

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run Go tests
        run: go test ./...

      - name: Lint web
        run: npm run lint --workspace @ytvd/web

      - name: Build web
        run: npm run build --workspace @ytvd/web

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p /opt/yt-downloader"

          rsync -az --delete \
            --filter='P .env' \
            --filter='P .runtime-secrets/' \
            --exclude='.git/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='*.cookies.txt' \
            --exclude='apps/web/dist/' \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:/opt/yt-downloader/"

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          YOUTUBE_COOKIES_B64: ${{ secrets.YOUTUBE_COOKIES_B64 }}
        run: |
          if [ -z "${PROD_ENV_FILE}" ]; then
            echo "PROD_ENV_FILE is not configured"
            exit 1
          fi

          PROD_ENV_B64="$(printf '%s' "${PROD_ENV_FILE}" | base64 | tr -d '\n')"
          YOUTUBE_COOKIES_B64_VALUE="${YOUTUBE_COOKIES_B64:-}"

          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export PROD_ENV_B64='${PROD_ENV_B64}'; export YOUTUBE_COOKIES_B64='${YOUTUBE_COOKIES_B64_VALUE}'; bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p /opt/yt-downloader
          cd /opt/yt-downloader

          printf '%s' "${PROD_ENV_B64}" | base64 -d > .env
          mkdir -p .runtime-secrets
          chown 100:101 .runtime-secrets
          chmod 750 .runtime-secrets

          if [ -n "${YOUTUBE_COOKIES_B64:-}" ]; then
            printf '%s' "${YOUTUBE_COOKIES_B64}" | base64 -d > .runtime-secrets/youtube-cookies.txt
            chown 100:101 .runtime-secrets/youtube-cookies.txt
            chmod 640 .runtime-secrets/youtube-cookies.txt
          else
            rm -f .runtime-secrets/youtube-cookies.txt
          fi

          docker compose --env-file .env -f deploy/compose/docker-compose.yml up -d --build --remove-orphans
          docker image prune -f
          EOF
