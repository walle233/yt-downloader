name: Deploy

on:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run Go tests
        run: go test ./...

      - name: Lint web
        run: npm run lint --workspace @ytvd/web

      - name: Build web
        run: npm run build --workspace @ytvd/web

  deploy:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GITHUB_SHA: ${{ github.sha }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          if [ -z "${PROD_ENV_FILE}" ]; then
            echo "PROD_ENV_FILE is not configured"
            exit 1
          fi

          PROD_ENV_B64="$(printf '%s' "${PROD_ENV_FILE}" | base64 | tr -d '\n')"

          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export GITHUB_SHA='${GITHUB_SHA}'; export PROD_ENV_B64='${PROD_ENV_B64}'; bash -s" <<'EOF'
          set -euo pipefail
          mkdir -p /opt/yt-downloader
          cd /opt/yt-downloader

          if [ ! -d .git ]; then
            git init
            git remote add origin git@github.com:walle233/yt-downloader.git
          fi

          git fetch origin main
          git checkout -B main origin/main
          git reset --hard ${GITHUB_SHA}
          git clean -fd

          printf '%s' "${PROD_ENV_B64}" | base64 -d > .env

          docker compose -f deploy/compose/docker-compose.yml up -d --build --remove-orphans
          docker image prune -f
          EOF
