services:
  caddy:
    image: caddy:2-alpine
    depends_on:
      - web
      - api
    env_file:
      - ../../.env
    ports:
      - "${EDGE_PORT:-80}:80"
      - "${EDGE_TLS_PORT:-443}:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.web
    env_file:
      - ../../.env
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    depends_on:
      - postgres
      - redis
    env_file:
      - ../../.env
    environment:
      API_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgres://ytvideos:ytvideos@postgres:5432/ytvideos?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      DOWNLOAD_ROOT: ${DOWNLOAD_ROOT:-/data/jobs}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-/run/secrets/youtube-cookies.txt}
      YTDLP_JS_RUNTIMES: ${YTDLP_JS_RUNTIMES:-node}
      DOWNLOAD_TTL_HOURS: ${DOWNLOAD_TTL_HOURS:-24}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    volumes:
      - ../../.runtime-secrets:/run/secrets:ro
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.worker
    depends_on:
      - postgres
      - redis
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://ytvideos:ytvideos@postgres:5432/ytvideos?sslmode=disable}
      REDIS_ADDR: ${REDIS_ADDR:-redis:6379}
      DOWNLOAD_ROOT: ${DOWNLOAD_ROOT:-/data/jobs}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-/run/secrets/youtube-cookies.txt}
      YTDLP_JS_RUNTIMES: ${YTDLP_JS_RUNTIMES:-node}
      DOWNLOAD_TTL_HOURS: ${DOWNLOAD_TTL_HOURS:-24}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5s}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    volumes:
      - job_data:/data/jobs
      - ../../.runtime-secrets:/run/secrets:ro
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ytvideos}
      POSTGRES_USER: ${POSTGRES_USER:-ytvideos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ytvideos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../db/init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  job_data:
